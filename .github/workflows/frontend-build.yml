# Runs on every push to main/master: ensures `npm run build` passes.
# For automatic Vercel deploys, connect this repo in the Vercel dashboard (recommended)
# or add VERCEL_* secrets and a vercel deploy step here.

name: Frontend build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
